<body class="is-preload">

	<!-- Page Wrapper -->
	<div id="page-wrapper">

		<!-- Header -->
		<header id="header">
			<h1><a href="index.html"><img src="images/logo.png"></a></h1>
			<nav id="nav">
				<ul>
					<li class="special">
						<a href="#menu" class="menuToggle"><span>Menu</span></a>
						<div id="menu">
							<ul>
								<li><a href="index.html">Home</a></li>
								<li><a href="contactUs.html">Contact Us</a></li>
								<!--<li><a href="generic.html">Generic</a></li>
											<li><a href="elements.html">Elements</a></li>
											<li><a href="#">Sign Up</a></li>
											<li><a href="#">Log In</a></li>-->
							</ul>
						</div>
					</li>
				</ul>
			</nav>
		</header>

		<!-- Main -->
		<article id="main">
			<header>
				<h2>Contact Us</h2>
				<p>Feel free to reach out to ask questions, share your ideas, or just talk snow!</p>
			</header>
			<section class="wrapper style5">
				<div class="inner">
					<section>
						<h4>Send us an email!</h4>
						<form method="post" action="https://formspree.io/f/xgojjlqw">
							<input type="hidden" name="_replyto" value="" id="replyto-field" />
							<div class="row gtr-uniform">
								<div class="col-6 col-12-xsmall">
									<input type="text" name="demo-name" id="demo-name" value="" placeholder="Name" />
								</div>
								<div class="col-6 col-12-xsmall">
									<input type="email" name="demo-email" id="demo-email" value=""
										placeholder="Email" />
								</div>
								<div class="col-6 col-12-small">
									<input type="checkbox" id="demo-copy" name="demo-copy">
									<label for="demo-copy">Email me a copy</label>
								</div>
								<div class="col-12">
									<textarea name="demo-message" id="demo-message" placeholder="Enter your message"
										rows="6"></textarea>
								</div>
								<div class="col-12">
									<ul class="actions">
										<li><input type="submit" value="Send" class="primary" /></li>
										<li><input type="reset" value="Reset" /></li>
									</ul>
								</div>
							</div>
						</form>
					</section>


				</div>
			</section>
		</article>

		<!-- Footer -->
		<footer id="footer">

				<li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>

			</ul>

	</div>

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/jquery.scrollex.min.js"></script>
	<script src="assets/js/jquery.scrolly.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/util.js"></script>
	<script src="assets/js/main.js"></script>

	<script>
		document.getElementById('demo-email').addEventListener('input', function () {
			document.getElementById('replyto-field').value =
				document.getElementById('demo-copy').checked ? this.value : '';
		});
		document.getElementById('demo-copy').addEventListener('change', function () {
			document.getElementById('replyto-field').value =
				this.checked ? document.getElementById('demo-email').value : '';
		});
	</script>
